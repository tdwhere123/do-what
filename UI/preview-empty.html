<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>do-what · 空闲</title>
<link rel="stylesheet" href="./styles.css">
<style>
body {
  padding: 24px;
  background: #D6D0C6;
  min-height: 100vh;
}
.window-chrome {
  width: 100%;
  max-width: 1280px;
  margin: 0 auto;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
}
.window-chrome .app-frame { height: 740px; }

/* Empty main area */
.empty-main {
  flex: 1;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 40px;
  position: relative;
  overflow: hidden;
}

/* Corner decorations — stroke-only, no color fill */
.deco-corner {
  position: absolute;
  opacity: 0.10;
  pointer-events: none;
}
.deco-tl { top: -16px; left: -16px; width: 120px; }
.deco-br { bottom: -16px; right: -16px; width: 130px; transform: rotate(180deg); }

/* Right panel idle sections — now replaced by panel-block in styles.css */
</style>
</head>
<body>

<div class="window-chrome">
<div class="app-frame">

  <!-- Top Bar -->
  <header class="topbar">
    <span class="topbar-logo">do-what</span>
    <div class="topbar-spacer"></div>
  </header>

  <!-- Main -->
  <div class="main">

    <!-- Sidebar — no active runs -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="label-caps">工作区</span>
        <button class="icon-btn">+</button>
      </div>

      <div class="ws-list">
        <div class="ws-item">
          <div class="ws-label">
            <span class="ws-chevron">▼</span>
            <span class="ws-name">/do-what-new</span>
          </div>
          <div class="run-list">
            <div style="padding:5px 8px;font-size:11px;color:var(--text-muted);font-style:italic;">
              暂无运行
            </div>
            <button class="run-new-btn" type="button" data-open-new-run>
              <img src="svg/organic/shape/wave/Elements-organic-shape-wave-curly.svg" alt="">
              新建 Run
            </button>
          </div>
        </div>

        <div class="ws-item">
          <div class="ws-label">
            <span class="ws-chevron">▶</span>
            <span class="ws-name">/project-alpha</span>
          </div>
        </div>
      </div>

      <!-- Status Cluster -->
      <div class="status-cluster">
        <div class="status-row">
          <div class="status-row-icon">
            <img src="svg/organic/shape/flash/Elements-organic-shape-flash.svg" alt="">
          </div>
          <span class="status-row-label">Engine</span>
          <span class="status-row-value ok">已就绪</span>
        </div>
        <div class="status-row">
          <div class="status-row-icon">
            <img src="svg/organic/shape/spiral/Elements-organic-shape-spiral.svg" alt="">
          </div>
          <span class="status-row-label">Core</span>
          <span class="status-row-value ok">运行中</span>
        </div>
        <div class="status-row">
          <div class="status-row-icon">
            <img src="svg/organic/shape/flower/Elements-organic-shape-flower-nature-cute.svg" alt="">
          </div>
          <span class="status-row-label">Soul</span>
          <span class="status-row-value idle">空闲</span>
        </div>
        <a class="status-settings-link" href="./preview-settings.html">
          <span class="status-settings-icon">
            <img src="svg/organic/shape/spiral/Elements-organic-shape-spiral.svg" alt="">
          </span>
          <span class="status-settings-label">设置</span>
        </a>
      </div>
    </aside>

    <!-- Empty main area -->
    <div class="empty-main">
      <!-- Corner decorations — stroke-only line SVGs -->
      <img class="deco-corner deco-tl"
           src="svg/organic/shape/line/Elements-organic-shape-line-drawing.svg" alt="">
      <img class="deco-corner deco-br"
           src="svg/organic/shape/line/Elements-organic-shape-line-s-drawing.svg" alt="">

      <!-- Center icon -->
      <div class="empty-icon">
        <img src="svg/organic/shape/wave/Elements-organic-shape-wave-curly.svg"
             style="width:56px;height:56px;" alt="">
      </div>

      <!-- Text -->
      <div class="empty-title">暂无运行</div>
      <div class="empty-subtitle">
        从左侧工作区中选择，或直接用侧栏里的新建 Run 发起一次协作。
      </div>

      <!-- Quick actions -->
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;">
          打开工作区
        </button>
        <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px;">
          浏览历史
        </button>
      </div>
    </div>

    <!-- Right Panel — overview + history with SVG empty states -->
    <div class="right-panel" style="display:flex;flex-direction:column;overflow:hidden;">

      <!-- Overview block -->
      <div class="panel-block" style="flex:1;min-height:0;display:flex;flex-direction:column;border-bottom:1px solid var(--border);">
        <div class="panel-block-title">概览</div>
        <div class="panel-block-empty">
          <img src="svg/organic/shape/flower/Elements-organic-shape-flower-nature-cute.svg"
               style="width:36px;height:36px;opacity:0.35;" alt="">
          <span>引擎待机中</span>
        </div>
      </div>

      <!-- History block -->
      <div class="panel-block" style="flex:1;min-height:0;display:flex;flex-direction:column;">
        <div class="panel-block-title">历史</div>
        <div class="panel-block-empty">
          <img src="svg/organic/shape/leaves/Elements-organic-shape-leaves-nature-twig.svg"
               style="width:36px;height:36px;opacity:0.25;" alt="">
          <span>暂无历史记录</span>
        </div>
      </div>

    </div>

  </div><!-- /main -->

</div><!-- /app-frame -->
</div><!-- /window-chrome -->

<div class="modal-backdrop" id="newRunModal" aria-hidden="true">
  <div class="new-run-modal" role="dialog" aria-modal="true" aria-labelledby="newRunTitle">
    <div class="new-run-modal-header">
      <div class="new-run-modal-title">
        <div class="new-run-modal-icon">
          <img src="svg/organic/shape/wave/Elements-organic-shape-wave-curly.svg" alt="">
        </div>
        <div>
          <div class="new-run-modal-heading" id="newRunTitle">新建 Run</div>
          <div class="new-run-modal-sub">从这里发起一次轻量协作，不进入大配置页。</div>
        </div>
      </div>
      <button class="modal-close" type="button" title="关闭" onclick="closeNewRunModal()">
        <img src="svg/organic/shape/star/Elements-organic-shape-star.svg" alt="">
      </button>
    </div>
    <div class="new-run-modal-body">
      <label class="modal-field">
        <span class="modal-label">这次要做什么</span>
        <textarea class="modal-textarea" name="new-run-goal" placeholder="例如：开始一个新的 UI 收口 Run。"></textarea>
      </label>

      <div class="modal-field">
        <span class="modal-label">协作模式</span>
        <div class="modal-mode-row">
          <button class="modal-choice active" type="button" onclick="selectModeChoice(this)">
            <div class="modal-mode-name">单引擎执行</div>
            <div class="modal-mode-note">一个节点直接完成</div>
          </button>
          <button class="modal-choice" type="button" onclick="selectModeChoice(this)">
            <div class="modal-mode-name">主从协作</div>
            <div class="modal-mode-note">主执行加辅助校验</div>
          </button>
          <button class="modal-choice" type="button" onclick="selectModeChoice(this)">
            <div class="modal-mode-name">分工协作</div>
            <div class="modal-mode-note">按阶段拆分</div>
          </button>
          <button class="modal-choice" type="button" onclick="selectModeChoice(this)">
            <div class="modal-mode-name">自主编排</div>
            <div class="modal-mode-note">仅在需要时开启</div>
          </button>
        </div>
      </div>

      <div class="modal-field">
        <span class="modal-label">参与节点</span>
        <div class="modal-node-row">
          <button class="modal-choice modal-node-card active" type="button" onclick="toggleNodeChoice(this)">
            <span class="modal-node-icon">
              <img src="svg/organic/shape/smile/Elements-organic-shape-smile-eye.svg" alt="">
            </span>
            <span class="modal-node-copy">
              <span class="modal-node-name">Claude Code</span>
              <span class="modal-node-role">主执行</span>
            </span>
          </button>
          <button class="modal-choice modal-node-card" type="button" onclick="toggleNodeChoice(this)">
            <span class="modal-node-icon">
              <img src="svg/organic/shape/flash/Elements-organic-shape-flash.svg" alt="">
            </span>
            <span class="modal-node-copy">
              <span class="modal-node-name">Codex</span>
              <span class="modal-node-role">校验 / 收口</span>
            </span>
          </button>
        </div>
      </div>

      <div class="modal-field">
        <button class="modal-more-toggle" type="button" id="moreOptionsToggle" onclick="toggleMoreOptions()">
          <span class="chevron">▶</span>
          更多选项
        </button>
        <div class="modal-more-panel" id="moreOptionsPanel">
          <div class="modal-more-row">
            <span class="modal-more-icon">
              <img src="svg/organic/shape/spiral/Elements-organic-shape-spiral.svg" alt="">
            </span>
            <span class="modal-more-copy">
              <span class="modal-more-title">审批策略</span>
              <span class="modal-more-value">标准审批</span>
            </span>
          </div>
          <div class="modal-more-row">
            <span class="modal-more-icon">
              <img src="svg/organic/shape/flower/Elements-organic-shape-flower-nature-cute.svg" alt="">
            </span>
            <span class="modal-more-copy">
              <span class="modal-more-title">Soul 策略</span>
              <span class="modal-more-value">仅加载当前 Run 相关内容</span>
            </span>
          </div>
          <div class="modal-more-row">
            <span class="modal-more-icon">
              <img src="svg/organic/shape/wave/Elements-organic-shape-wave-curly.svg" alt="">
            </span>
            <span class="modal-more-copy">
              <span class="modal-more-title">自主编排</span>
              <span class="modal-more-value">默认关闭，需要时再启用</span>
            </span>
          </div>
        </div>
      </div>
    </div>
    <div class="new-run-modal-footer">
      <button class="btn btn-secondary" type="button" onclick="closeNewRunModal()">取消</button>
      <button class="btn btn-primary" type="button">开始 Run</button>
    </div>
  </div>
</div>

<script>
function openNewRunModal() {
  const modal = document.getElementById('newRunModal');
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
}

function closeNewRunModal() {
  const modal = document.getElementById('newRunModal');
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
}

function toggleMoreOptions() {
  const toggle = document.getElementById('moreOptionsToggle');
  const panel = document.getElementById('moreOptionsPanel');
  toggle.classList.toggle('open');
  panel.classList.toggle('open');
}

function selectModeChoice(button) {
  button.closest('.modal-mode-row').querySelectorAll('.modal-choice').forEach(el => el.classList.remove('active'));
  button.classList.add('active');
}

function toggleNodeChoice(button) {
  const row = button.closest('.modal-node-row');
  const active = row.querySelectorAll('.modal-choice.active');
  if (button.classList.contains('active') && active.length === 1) {
    return;
  }
  button.classList.toggle('active');
}

document.querySelectorAll('[data-open-new-run]').forEach(button => {
  button.addEventListener('click', openNewRunModal);
});

document.addEventListener('click', e => {
  if (e.target.id === 'newRunModal') {
    closeNewRunModal();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeNewRunModal();
  }
});
</script>

</body>
</html>
